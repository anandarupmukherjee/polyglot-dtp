name: cd-release

on:
  push:
    branches: [release]
  workflow_dispatch:

concurrency:
  group: cd-release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_DJANGO: ghcr.io/anandarupmukherjee/polyglot-dtp/django
  IMAGE_REACTUI: ghcr.io/anandarupmukherjee/polyglot-dtp/reactui

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: infrastructure/django
          push: true
          tags: |
            ${{ env.IMAGE_DJANGO }}:latest
            ${{ env.IMAGE_DJANGO }}:${{ steps.vars.outputs.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_DJANGO }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_DJANGO }}:buildcache,mode=max

      - name: Build & push UI
        uses: docker/build-push-action@v6
        with:
          context: ui/react
          push: true
          build-args: |
            VITE_API_BASE=
          tags: |
            ${{ env.IMAGE_REACTUI }}:latest
            ${{ env.IMAGE_REACTUI }}:${{ steps.vars.outputs.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_REACTUI }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REACTUI }}:buildcache,mode=max

  deploy:
    needs: build-push
    runs-on: [self-hosted, dtp-prod]
    environment: production
    steps:
      - name: Check PROD_DIR is set
        shell: bash
        run: |
          : "${PROD_DIR:?PROD_DIR env var must be set on the self-hosted runner (points to the production clone of the repo)}"
          test -d "$PROD_DIR/.git" || { echo "PROD_DIR=$PROD_DIR is not a git checkout"; exit 1; }
          test -f "$PROD_DIR/compose.yaml" || { echo "compose.yaml missing in PROD_DIR"; exit 1; }

      - name: Update source on prod host
        shell: bash
        run: |
          cd "$PROD_DIR"
          git fetch --prune origin
          git checkout release
          git reset --hard origin/release

      - name: Log in to GHCR on prod host
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull updated images
        shell: bash
        run: |
          cd "$PROD_DIR"
          docker compose pull django reactui

      - name: Restart stack
        shell: bash
        run: |
          cd "$PROD_DIR"
          docker compose up -d

      - name: Wait for backend to be healthy
        shell: bash
        run: |
          cd "$PROD_DIR"
          for i in {1..30}; do
            status=$(docker compose ps --format json django 2>/dev/null | grep -o '"Health":"[^"]*"' | head -1 || true)
            echo "attempt $i: $status"
            echo "$status" | grep -q '"healthy"' && exit 0
            sleep 5
          done
          echo "backend did not become healthy"
          docker compose logs --tail=200 django
          exit 1

      - name: Run Django migrations
        shell: bash
        run: |
          cd "$PROD_DIR"
          docker compose exec -T django python manage.py migrate --noinput

      - name: Show stack status
        if: always()
        shell: bash
        run: |
          cd "$PROD_DIR"
          docker compose ps
