<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DTP Portal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; min-height: 100vh; }
      body {
        background: linear-gradient(135deg, #0d1117 0%, #0f0c29 35%, #1a1040 65%, #0d1117 100%);
        background-attachment: fixed;
        color: #f0f4f8;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 3px; }
      ::placeholder { color: rgba(255,255,255,0.3) !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
